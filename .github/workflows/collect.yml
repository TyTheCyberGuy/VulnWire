name: Collect VulnWire Intel

on:
  schedule:
    - cron: "0 12 * * *"    # 8:00 AM EDT
    - cron: "0 16 * * *"    # 12:00 PM EDT
    - cron: "30 19 * * *"   # 3:30 PM EDT
    - cron: "0 4 * * *"     # 12:00 AM EDT
  workflow_dispatch: {}   # lets you trigger a run manually from the Actions tab

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests feedparser

      - name: Collect CVE intel (CISA KEV + NVD)
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          VULNWIRE_ENABLE_AI: "true"
          VULNWIRE_MAX_ITEMS: "25"
        run: python scripts/collect_intel.py

      - name: Collect security news (RSS)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          VULNWIRE_ENABLE_AI: "true"
          VULNWIRE_MAX_PER_FEED: "15"
        run: python scripts/collect_news.py

      - name: Commit updated data
        run: |
          git config user.name "vulnwire-bot"
          git config user.email "actions@github.com"
          git add data/intel.json data/news.json
          git diff --quiet --cached || git commit -m "chore: refresh VulnWire feeds"
          git push
