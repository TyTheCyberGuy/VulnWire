name: Collect VulnWire Intel

on:
  schedule:
    # News + KEV intel refresh every 2 hours (RSS flows continuously;
    # KEV updates weekday business hours — 2h keeps both fresh).
    - cron: "0 */2 * * *"
  workflow_dispatch: {}     # manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests feedparser

      - name: Run intel collector
        env:
          # Optional, free — raises the NVD rate limit. No other keys needed.
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
          VULNWIRE_MAX_ITEMS: "25"
        run: python scripts/collect_intel.py

      - name: Run news collector
        env:
          VULNWIRE_MAX_PER_FEED: "15"
          # Full-article fetching disabled: cards use extracted facts + attribution only
          VULNWIRE_FETCH_ARTICLES: "false"
        run: python scripts/collect_news.py

      - name: Run EPSS surge detector (daily — EPSS itself publishes once per day)
        # The shell gates this to the 12:00 UTC run (or manual dispatch).
        # Running it more often adds no signal and shrinks per-run deltas,
        # weakening surge detection.
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          HOUR=$(date -u +%H)
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ] || [ "$HOUR" = "12" ]; then
            python scripts/collect_epss_movers.py
          else
            echo "Skipping EPSS movers — runs at 12:00 UTC only (EPSS publishes daily)."
          fi

      - name: Build unified integration feed
        run: python scripts/build_feed.py

      - name: Commit updated data
        run: |
          git config user.name "vulnwire-bot"
          git config user.email "actions@github.com"
          git add data/intel.json data/news.json data/movers.json data/epss_state.json data/feed.json
          git diff --quiet --cached || git commit -m "chore: refresh VulnWire feeds"
          git push
