name: Collect VulnWire Intel

on:
  schedule:
    # Runs every day at 12:00 UTC. Adjust as you like — cron is UTC-based.
    - cron: "0 12 * * *"
  workflow_dispatch: {}   # lets you trigger a run manually from the Actions tab

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run collector
        env:
          # Both are optional. Without NVD_API_KEY, NVD lookups are slower
          # (rate limited) but still work. Without OPENAI_API_KEY, AI
          # enrichment fields are simply left null.
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          VULNWIRE_ENABLE_AI: "true"
          VULNWIRE_MAX_ITEMS: "25"
        run: python collect_intel.py

      - name: Commit updated intel.json
        run: |
          git config user.name "vulnwire-bot"
          git config user.email "actions@github.com"
          git add data/intel.json
          git diff --quiet --cached || git commit -m "chore: refresh VulnWire intel feed"
          git push
